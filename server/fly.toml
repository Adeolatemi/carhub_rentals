# fly.toml app configuration file generated for server-icy-grass-4740 on 2026-04-04T17:13:30+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'server-icy-grass-4740'
primary_region = 'jnb'

[build]

[[mounts]]
  source = 'data'
  destination = '/data'
  auto_extend_size_threshold = 80
  auto_extend_size_increment = '1GB'
  auto_extend_size_limit = '10GB'

[http_service]
  internal_port = 5000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
 
[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  
